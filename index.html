<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Philips × Zeotap — Innovation and You, Powered by Intelligent Data</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #06080F; color: #E2E8F0; font-family: -apple-system, 'Inter', 'Segoe UI', sans-serif; overflow-x: hidden; }
    ::selection { background: rgba(43,91,255,0.3); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #06080F; }
    ::-webkit-scrollbar-thumb { background: rgba(43,91,255,0.4); border-radius: 3px; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }
    @keyframes pulse-glow { 0%,100%{opacity:.4} 50%{opacity:.8} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    .shimmer {
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 3s infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;
    const { motion, AnimatePresence, useInView, useScroll, useTransform, useSpring } = window.Motion;

    /* ─── TOKENS ─── */
    const T = {
      philips:  "#0B5ED7",
      zeotap:   "#2B5BFF",
      accent:   "#22D3EE",
      bg:       "#06080F",
      bgAlt:    "#0C1221",
      surface:  "#111827",
      text:     "#E2E8F0",
      muted:    "#64748B",
      border:   "rgba(255,255,255,0.07)",
    };

    /* ─── VARIANTS ─── */
    const fadeUp = {
      hidden:  { opacity: 0, y: 48 },
      visible: { opacity: 1, y: 0, transition: { duration: 0.75, ease: [0.25, 0.1, 0.25, 1] } },
    };
    const stagger = { visible: { transition: { staggerChildren: 0.1 } } };
    const scaleIn = {
      hidden:  { opacity: 0, scale: 0.9 },
      visible: { opacity: 1, scale: 1, transition: { duration: 0.6, ease: "easeOut" } },
    };

    /* ─── PARTICLES ─── */
    function Particles({ count = 50 }) {
      const dots = useMemo(() => Array.from({ length: count }, (_, i) => ({
        id: i,
        x: Math.random() * 100, y: Math.random() * 100,
        size: Math.random() * 2.5 + 0.8,
        delay: Math.random() * 5,
        duration: Math.random() * 8 + 6,
        opacity: Math.random() * 0.35 + 0.08,
        color: i % 3 === 0 ? T.philips : i % 3 === 1 ? T.zeotap : T.accent,
      })), [count]);

      return (
        <div style={{ position:"absolute", inset:0, overflow:"hidden", pointerEvents:"none", zIndex:1 }}>
          {dots.map(d => (
            <motion.div key={d.id}
              style={{ position:"absolute", left:`${d.x}%`, top:`${d.y}%`, width:d.size, height:d.size, borderRadius:"50%", background:d.color }}
              animate={{ y:[0,-24,0], opacity:[d.opacity, d.opacity*2.2, d.opacity] }}
              transition={{ duration:d.duration, delay:d.delay, repeat:Infinity, ease:"easeInOut" }}
            />
          ))}
        </div>
      );
    }

    /* ─── GRID BG ─── */
    function GridBg() {
      return (
        <div style={{
          position:"absolute", inset:0, overflow:"hidden", pointerEvents:"none",
          maskImage:"radial-gradient(ellipse 80% 55% at 50% 20%, black 30%, transparent 100%)",
          WebkitMaskImage:"radial-gradient(ellipse 80% 55% at 50% 20%, black 30%, transparent 100%)",
        }}>
          <div style={{
            position:"absolute", inset:0, opacity:0.07,
            backgroundImage:`linear-gradient(${T.muted} 1px, transparent 1px), linear-gradient(90deg, ${T.muted} 1px, transparent 1px)`,
            backgroundSize:"64px 64px",
          }}/>
        </div>
      );
    }

    /* ─── COUNTER ─── */
    function Counter({ end, prefix="", suffix="", duration=2.2 }) {
      const ref = useRef(null);
      const inView = useInView(ref, { once:true, margin:"-80px" });
      const [val, setVal] = useState(0);
      useEffect(() => {
        if (!inView) return;
        let start = 0;
        const step = end / (duration * 60);
        const id = setInterval(() => {
          start += step;
          if (start >= end) { setVal(end); clearInterval(id); }
          else setVal(start);
        }, 1000/60);
        return () => clearInterval(id);
      }, [inView, end, duration]);
      const display = end % 1 !== 0 ? val.toFixed(1) : Math.round(val);
      return <span ref={ref}>{prefix}{display}{suffix}</span>;
    }

    /* ─── GLASS CARD ─── */
    function GlassCard({ children, style, noHover=false, ...props }) {
      return (
        <motion.div
          variants={scaleIn}
          whileHover={noHover ? {} : { scale:1.025, y:-5 }}
          transition={{ type:"spring", stiffness:280, damping:22 }}
          style={{
            background:"rgba(17,24,39,0.55)",
            backdropFilter:"blur(20px)", WebkitBackdropFilter:"blur(20px)",
            border:`1px solid ${T.border}`,
            borderRadius:18, padding:"28px 24px",
            position:"relative", overflow:"hidden",
            ...style,
          }}
          {...props}
        >
          {children}
        </motion.div>
      );
    }

    /* ─── SECTION ─── */
    function Section({ children, id, style }) {
      const ref = useRef(null);
      const inView = useInView(ref, { once:true, margin:"-60px" });
      return (
        <motion.section ref={ref} id={id}
          initial="hidden" animate={inView?"visible":"hidden"} variants={stagger}
          style={{ maxWidth:1180, margin:"0 auto", padding:"96px 24px", position:"relative", ...style }}
        >
          {children}
        </motion.section>
      );
    }

    /* ─── GRADIENT TEXT ─── */
    function GT({ children }) {
      return (
        <span style={{
          background:`linear-gradient(125deg, ${T.philips}, ${T.zeotap} 50%, ${T.accent})`,
          WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", backgroundClip:"text",
        }}>
          {children}
        </span>
      );
    }

    /* ─── EYEBROW ─── */
    function Eyebrow({ children }) {
      return (
        <div style={{
          display:"inline-flex", alignItems:"center", gap:6,
          fontSize:11, fontWeight:700, letterSpacing:"0.14em", textTransform:"uppercase",
          color:T.accent, marginBottom:18,
        }}>
          <span style={{ width:18, height:1, background:T.accent, display:"inline-block" }}/>
          {children}
          <span style={{ width:18, height:1, background:T.accent, display:"inline-block" }}/>
        </div>
      );
    }

    /* ═══════════ MAIN APP ═══════════ */
    function App() {
      const { scrollYProgress } = useScroll();
      const navBg = useTransform(scrollYProgress, [0,0.04], ["rgba(6,8,15,0)","rgba(6,8,15,0.92)"]);
      const navBorder = useTransform(scrollYProgress, [0,0.04], ["rgba(255,255,255,0)","rgba(255,255,255,0.07)"]);

      return (
        <div style={{ background:T.bg, color:T.text, minHeight:"100vh", overflowX:"hidden" }}>

          {/* ── NAV ── */}
          <motion.nav style={{
            position:"fixed", top:0, left:0, right:0, zIndex:200,
            background:navBg, borderBottom:`1px solid`, borderColor:navBorder,
            backdropFilter:"blur(14px)",
          }}>
            <div style={{ maxWidth:1180, margin:"0 auto", padding:"13px 24px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <span style={{ display:"inline-flex", alignItems:"center", gap:6 }}>
                  <span style={{ width:7, height:7, borderRadius:"50%", background:T.philips, display:"inline-block" }}/>
                  <span style={{ fontWeight:800, fontSize:14, letterSpacing:"-0.02em" }}>PHILIPS</span>
                </span>
                <span style={{ color:T.muted, fontSize:16 }}>×</span>
                <span style={{ fontWeight:800, fontSize:14, letterSpacing:"-0.02em", color:T.zeotap }}>zeotap</span>
              </div>
              <div style={{ display:"flex", gap:28, fontSize:13 }}>
                {[["Challenge","#challenge"],["Platform","#platform"],["Use Cases","#usecases"],["Results","#results"]].map(([l,h]) => (
                  <a key={l} href={h} style={{ color:T.muted, transition:"color .2s" }}
                    onMouseOver={e=>e.target.style.color=T.text} onMouseOut={e=>e.target.style.color=T.muted}>{l}</a>
                ))}
              </div>
            </div>
          </motion.nav>

          {/* ══════════ HERO ══════════ */}
          <section style={{ position:"relative", minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden" }}>
            {/* Mesh gradient */}
            <div style={{ position:"absolute", inset:0, background:`
              radial-gradient(ellipse 90% 70% at 15% 0%, rgba(11,94,215,0.20) 0%, transparent 55%),
              radial-gradient(ellipse 70% 60% at 85% 20%, rgba(43,91,255,0.16) 0%, transparent 55%),
              radial-gradient(ellipse 55% 45% at 50% 90%, rgba(34,211,238,0.10) 0%, transparent 60%)
            ` }}/>
            <Particles count={70}/>
            <GridBg/>

            {/* Animated beam */}
            <motion.div style={{
              position:"absolute", top:0, left:"50%", width:1, height:"45%",
              background:`linear-gradient(to bottom, transparent, ${T.zeotap}50, transparent)`,
            }} animate={{ opacity:[0.25,0.75,0.25] }} transition={{ duration:3.5, repeat:Infinity }}/>

            {/* Orbiting ring */}
            <motion.div style={{
              position:"absolute", top:"50%", left:"50%", width:500, height:500,
              borderRadius:"50%", border:`1px solid rgba(43,91,255,0.08)`,
              transform:"translate(-50%,-50%)",
            }} animate={{ rotate:360 }} transition={{ duration:40, repeat:Infinity, ease:"linear" }}/>
            <motion.div style={{
              position:"absolute", top:"50%", left:"50%", width:360, height:360,
              borderRadius:"50%", border:`1px solid rgba(11,94,215,0.07)`,
              transform:"translate(-50%,-50%)",
            }} animate={{ rotate:-360 }} transition={{ duration:28, repeat:Infinity, ease:"linear" }}/>

            {/* Content */}
            <div style={{ position:"relative", zIndex:10, textAlign:"center", maxWidth:920, padding:"0 24px" }}>
              {/* Badge */}
              <motion.div initial={{ opacity:0, y:24 }} animate={{ opacity:1, y:0 }} transition={{ duration:0.7 }}
                style={{
                  display:"inline-flex", alignItems:"center", gap:8,
                  padding:"7px 18px", borderRadius:999,
                  background:"rgba(43,91,255,0.10)", border:`1px solid rgba(43,91,255,0.22)`,
                  fontSize:12, fontWeight:600, color:T.accent, marginBottom:36, letterSpacing:"0.03em",
                }}>
                ✦ Innovation and You — Powered by Intelligent Data ✦
              </motion.div>

              {/* H1 */}
              <motion.h1 initial={{ opacity:0, y:50 }} animate={{ opacity:1, y:0 }} transition={{ duration:1, delay:0.2, ease:[0.25,0.1,0.25,1] }}
                style={{ fontSize:"clamp(2.6rem, 6.5vw, 4.8rem)", fontWeight:900, lineHeight:1.07, letterSpacing:"-0.045em", margin:"0 0 8px" }}>
                When <GT>health technology</GT>
              </motion.h1>
              <motion.h1 initial={{ opacity:0, y:50 }} animate={{ opacity:1, y:0 }} transition={{ duration:1, delay:0.35, ease:[0.25,0.1,0.25,1] }}
                style={{ fontSize:"clamp(2.6rem, 6.5vw, 4.8rem)", fontWeight:900, lineHeight:1.07, letterSpacing:"-0.045em", margin:"0 0 32px" }}>
                meets <GT>intelligent data</GT>
              </motion.h1>

              {/* Subtitle */}
              <motion.p initial={{ opacity:0, y:30 }} animate={{ opacity:1, y:0 }} transition={{ duration:0.8, delay:0.55 }}
                style={{ fontSize:"clamp(1rem, 2.2vw, 1.22rem)", color:T.muted, maxWidth:660, margin:"0 auto 44px", lineHeight:1.78 }}>
                Zeotap CDP is the missing intelligence layer that unifies Philips customer data across every market, product, and channel — turning fragmented profiles into consented, actionable audiences.
              </motion.p>

              {/* CTAs */}
              <motion.div initial={{ opacity:0, y:20 }} animate={{ opacity:1, y:0 }} transition={{ duration:0.6, delay:0.8 }}
                style={{ display:"flex", gap:14, justifyContent:"center", flexWrap:"wrap" }}>
                <motion.a href="#challenge" whileHover={{ scale:1.04 }} whileTap={{ scale:0.97 }}
                  style={{
                    background:`linear-gradient(135deg, ${T.philips}, ${T.zeotap})`,
                    color:"white", borderRadius:13, padding:"15px 34px",
                    fontSize:15, fontWeight:700, display:"inline-flex", alignItems:"center", gap:8,
                    boxShadow:`0 0 32px rgba(43,91,255,0.35)`, cursor:"pointer",
                  }}>
                  Explore the Vision →
                </motion.a>
                <motion.a href="#platform" whileHover={{ scale:1.04, background:"rgba(255,255,255,0.09)" }} whileTap={{ scale:0.97 }}
                  style={{
                    background:"rgba(255,255,255,0.05)", color:T.text,
                    border:`1px solid rgba(255,255,255,0.13)`, borderRadius:13,
                    padding:"15px 34px", fontSize:15, fontWeight:500, cursor:"pointer",
                  }}>
                  See the Platform
                </motion.a>
              </motion.div>

              {/* Logos */}
              <motion.div initial={{ opacity:0 }} animate={{ opacity:1 }} transition={{ delay:1.3, duration:0.9 }}
                style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:24, marginTop:64 }}>
                <span style={{ fontWeight:900, fontSize:20, letterSpacing:"0.04em", color:T.text }}>PHILIPS</span>
                <div style={{ width:1, height:22, background:T.border }}/>
                <span style={{ fontWeight:900, fontSize:20, color:T.zeotap }}>zeotap</span>
              </motion.div>
            </div>

            {/* Scroll cue */}
            <motion.div animate={{ y:[0,9,0] }} transition={{ duration:2.2, repeat:Infinity }}
              style={{ position:"absolute", bottom:38, left:"50%", transform:"translateX(-50%)", display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:10, color:T.muted, letterSpacing:"0.14em", textTransform:"uppercase" }}>Scroll</span>
              <div style={{ width:1, height:22, background:`linear-gradient(to bottom, ${T.muted}80, transparent)` }}/>
            </motion.div>
          </section>

          {/* ══════════ CHALLENGE ══════════ */}
          <section id="challenge" style={{ background:T.bgAlt, borderTop:`1px solid ${T.border}`, borderBottom:`1px solid ${T.border}`, position:"relative" }}>
            <Section>
              <motion.div variants={fadeUp} style={{ textAlign:"center", maxWidth:800, margin:"0 auto" }}>
                <Eyebrow>The Challenge</Eyebrow>
                <h2 style={{ fontSize:"clamp(2rem,4.5vw,3.1rem)", fontWeight:800, letterSpacing:"-0.035em", lineHeight:1.14, margin:"0 0 24px" }}>
                  Powerful tools.{" "}
                  <span style={{ color:T.muted }}>Fragmented data.</span>{" "}
                  Missed opportunities.
                </h2>
                <p style={{ fontSize:17, color:T.muted, lineHeight:1.78 }}>
                  Philips runs <strong style={{ color:T.text }}>Oracle Eloqua</strong>, <strong style={{ color:T.text }}>Salesforce Marketing Cloud</strong>, and <strong style={{ color:T.text }}>AWS</strong> across 100+ markets — yet customer profiles remain siloed by product line, region, and channel. Without a unified identity layer, match rates suffer, suppression breaks down, and personalisation at scale stays out of reach.
                </p>
              </motion.div>

              {/* Convergence diagram */}
              <motion.div variants={fadeUp} style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:16, marginTop:56, flexWrap:"wrap" }}>
                {["Oracle Eloqua","Salesforce MC","AWS"].map((t,i)=>(
                  <motion.div key={t}
                    initial={{ opacity:0, x:(i-1)*60 }}
                    whileInView={{ opacity:1, x:0 }}
                    viewport={{ once:true }}
                    transition={{ delay:i*0.15, duration:0.6 }}
                    style={{ padding:"14px 26px", borderRadius:11, background:"rgba(255,255,255,0.03)", border:`1px solid ${T.border}`, fontSize:14, fontWeight:600, color:T.muted }}>
                    {t}
                  </motion.div>
                ))}
                <motion.span initial={{ scale:0 }} whileInView={{ scale:1 }} viewport={{ once:true }} transition={{ delay:0.55, type:"spring" }}
                  style={{ fontSize:20, color:T.accent }}>→</motion.span>
                <motion.div initial={{ opacity:0, scale:0.75 }} whileInView={{ opacity:1, scale:1 }} viewport={{ once:true }} transition={{ delay:0.75, type:"spring", stiffness:200 }}
                  style={{
                    padding:"14px 26px", borderRadius:11,
                    background:`linear-gradient(135deg, ${T.philips}18, ${T.zeotap}18)`,
                    border:`1px solid ${T.zeotap}50`,
                    fontSize:14, fontWeight:800, color:T.accent,
                    boxShadow:`0 0 40px ${T.zeotap}15`,
                  }}>
                  Zeotap CDP
                </motion.div>
              </motion.div>

              {/* Pain cards */}
              <motion.div variants={stagger} style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(220px,1fr))", gap:14, marginTop:44 }}>
                {[
                  { label:"Siloed Profiles", desc:"Customers unknown across products and brands" },
                  { label:"Low Match Rates", desc:"Audiences lost before paid media activation" },
                  { label:"Broken Suppression", desc:"Budget wasted reaching existing customers" },
                  { label:"Consent Gaps", desc:"Governance varies by market, creating risk" },
                ].map(p=>(
                  <motion.div key={p.label} variants={fadeUp}
                    style={{ padding:"20px", borderRadius:12, background:"rgba(255,255,255,0.025)", border:`1px solid ${T.border}`, textAlign:"center" }}>
                    <div style={{ fontSize:14, fontWeight:700, color:T.text, marginBottom:5 }}>{p.label}</div>
                    <div style={{ fontSize:13, color:T.muted, lineHeight:1.55 }}>{p.desc}</div>
                  </motion.div>
                ))}
              </motion.div>
            </Section>
          </section>

          {/* ══════════ PLATFORM ══════════ */}
          <section id="platform" style={{ position:"relative" }}>
            <Section>
              <motion.div variants={fadeUp} style={{ textAlign:"center", marginBottom:52 }}>
                <Eyebrow>The Platform</Eyebrow>
                <h2 style={{ fontSize:"clamp(2rem,4.5vw,3.1rem)", fontWeight:800, letterSpacing:"-0.035em", lineHeight:1.14, margin:0 }}>
                  Built to <GT>Unify</GT>, <GT>Govern</GT>, and <GT>Activate</GT>
                </h2>
              </motion.div>

              <motion.div variants={stagger} style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(290px,1fr))", gap:22 }}>
                {[
                  { icon:"⬡", title:"Unify", color:T.philips, body:"Resolve identities across every Philips touchpoint — Philips.com, regional shops, Avent, Hue, and support — into one privacy-safe customer profile that travels with the customer." },
                  { icon:"⬡", title:"Govern", color:T.zeotap, body:"Consent management and data governance built-in. Stay compliant across all 100+ Philips markets without slowing down activation or adding overhead." },
                  { icon:"⬡", title:"Activate", color:T.accent, body:"Push enriched audiences directly into Oracle, Salesforce, AWS, and 150+ connectors — no rip-and-replace, just better performance in every system you already own." },
                ].map(c=>(
                  <GlassCard key={c.title}>
                    <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:`linear-gradient(90deg, transparent, ${c.color}, transparent)` }}/>
                    <div style={{
                      width:48, height:48, borderRadius:13, display:"flex", alignItems:"center", justifyContent:"center",
                      background:`${c.color}14`, color:c.color, fontSize:22, marginBottom:20,
                    }}>
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                        {c.title==="Unify" && <><ellipse cx="12" cy="12" rx="10" ry="4"/><path d="M2 12c0 4 4.5 7.4 10 7.4s10-3.4 10-7.4"/><path d="M2 12c0-4 4.5-7.4 10-7.4s10 3.4 10 7.4"/></>}
                        {c.title==="Govern" && <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></>}
                        {c.title==="Activate" && <><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></>}
                      </svg>
                    </div>
                    <h3 style={{ fontSize:22, fontWeight:800, margin:"0 0 12px", letterSpacing:"-0.025em" }}>{c.title}</h3>
                    <p style={{ fontSize:15, color:T.muted, lineHeight:1.74, margin:0 }}>{c.body}</p>
                  </GlassCard>
                ))}
              </motion.div>

              {/* Stack diagram */}
              <motion.div variants={fadeUp} style={{ marginTop:60 }}>
                <GlassCard noHover style={{ padding:"40px 32px" }}>
                  <div style={{ textAlign:"center", marginBottom:36 }}>
                    <Eyebrow>Stack Integration</Eyebrow>
                    <h3 style={{ fontSize:"clamp(1.5rem,3vw,2rem)", fontWeight:800, letterSpacing:"-0.03em", margin:0 }}>
                      Selective Modernisation — <span style={{ color:T.muted }}>Not Rip-and-Replace</span>
                    </h3>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr auto 1fr", gap:24, alignItems:"center" }}>
                    {/* Sources */}
                    <div style={{ display:"flex", flexDirection:"column", gap:10, alignItems:"flex-end" }}>
                      {["Philips.com","Avent Store","Hue.com","HealthSuite","Support Portal"].map((s,i)=>(
                        <motion.div key={s} initial={{ opacity:0, x:-40 }} whileInView={{ opacity:1, x:0 }} viewport={{ once:true }} transition={{ delay:i*0.08, duration:0.5 }}
                          style={{ padding:"10px 18px", borderRadius:9, background:"rgba(255,255,255,0.03)", border:`1px solid ${T.border}`, fontSize:13, fontWeight:500, color:T.muted, whiteSpace:"nowrap" }}>
                          {s}
                        </motion.div>
                      ))}
                      <div style={{ fontSize:10, color:T.muted, letterSpacing:"0.12em", textTransform:"uppercase", marginTop:6 }}>Data Sources</div>
                    </div>

                    {/* CDP hub */}
                    <motion.div initial={{ opacity:0, scale:0.8 }} whileInView={{ opacity:1, scale:1 }} viewport={{ once:true }} transition={{ delay:0.45, type:"spring", stiffness:180 }}
                      style={{
                        padding:"28px 24px", borderRadius:18, textAlign:"center", minWidth:156,
                        background:`linear-gradient(155deg, ${T.philips}16, ${T.zeotap}18)`,
                        border:`1px solid ${T.zeotap}45`,
                        boxShadow:`0 0 55px ${T.zeotap}13, inset 0 0 35px ${T.zeotap}04`,
                      }}>
                      <div style={{ fontSize:28, marginBottom:10 }}>⬡</div>
                      <div style={{ fontSize:17, fontWeight:900, letterSpacing:"-0.025em" }}>Zeotap CDP</div>
                      <div style={{ fontSize:11, color:T.muted, marginTop:10, lineHeight:1.65 }}>Identity Resolution<br/>Consent Layer<br/>Audience Engine</div>
                    </motion.div>

                    {/* Channels */}
